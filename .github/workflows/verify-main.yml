name: Verify current CodeQL main

on:
  workflow_dispatch:
    inputs:
      repro_repository:
        description: Repository containing the workflow fixtures
        required: true
        default: 1sgtpepper/codeql-actions-checkout-path-repro
      repro_ref:
        description: Branch or commit containing the workflow fixtures
        required: true
        default: codeql-22213-expanded-matrix
      codeql_repository:
        description: CodeQL repository containing the queries to verify
        required: true
        default: github/codeql
      codeql_ref:
        description: Branch or commit containing the queries to verify
        required: true
        default: main
      expect_fixed:
        description: Require alternate checkout paths to produce critical alerts
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check out public candidate
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repro_repository }}
          ref: ${{ inputs.repro_ref }}

      - name: Check out candidate into an alternate path
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repro_repository }}
          ref: ${{ inputs.repro_ref }}
          path: runtime-candidate

      - name: Prove execution and clean nested checkout
        shell: bash
        run: |
          rm -f /tmp/alternate-checkout-path-canary
          bash runtime-candidate/proof.sh
          test -f /tmp/alternate-checkout-path-canary
          rm -rf -- "$GITHUB_WORKSPACE/runtime-candidate"

      - name: Initialize released analysis
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          queries: security-extended
          db-location: ${{ runner.temp }}/codeql-db

      - name: Create database with released analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          upload: never
          upload-database: false
          output: release-results

      - name: Check out candidate CodeQL source
        env:
          CODEQL_REPOSITORY: ${{ inputs.codeql_repository }}
          CODEQL_REF: ${{ inputs.codeql_ref }}
        shell: bash
        run: |
          git clone --filter=blob:none --depth=1 --branch "$CODEQL_REF" \
            "https://github.com/$CODEQL_REPOSITORY.git" "$RUNNER_TEMP/codeql-candidate"
          echo "CODEQL_CANDIDATE_SHA=$(git -C "$RUNNER_TEMP/codeql-candidate" rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Analyze with candidate CodeQL queries
        shell: bash
        run: |
          codeql_bin=$(jq -r .cmd <<<"$CODEQL_ACTION_CLI_VERSION_INFO")
          "$codeql_bin" database analyze "$RUNNER_TEMP/codeql-db/actions" \
            "$RUNNER_TEMP/codeql-candidate/actions/ql/src/Security/CWE-829/UntrustedCheckoutCritical.ql" \
            "$RUNNER_TEMP/codeql-candidate/actions/ql/src/Security/CWE-829/UntrustedCheckoutHigh.ql" \
            --additional-packs="$RUNNER_TEMP/codeql-candidate" \
            --format=sarif-latest \
            --output=main-results.sarif \
            --rerun

      - name: Verify candidate behavior
        env:
          EXPECT_FIXED: ${{ inputs.expect_fixed }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          sarif = json.load(open('main-results.sarif', encoding='utf-8'))
          selected = {}
          for run in sarif.get('runs', []):
              for result in run.get('results', []):
                  rule = result.get('ruleId')
                  if rule not in {
                      'actions/untrusted-checkout/critical',
                      'actions/untrusted-checkout/high',
                  }:
                      continue
                  uri = result['locations'][0]['physicalLocation']['artifactLocation']['uri']
                  selected.setdefault(uri, []).append(rule)

          print(json.dumps({
              'codeql_candidate_sha': os.environ['CODEQL_CANDIDATE_SHA'],
              'selected_alerts': selected,
          }, indent=2, sort_keys=True))

          def rules_for(name):
              matches = []
              for uri, rules in selected.items():
                  if uri.endswith('/' + name) or uri.endswith(name):
                      matches.extend(rules)
              return matches

          assert 'actions/untrusted-checkout/critical' in rules_for('default-path-positive.yml'), selected
          assert 'actions/untrusted-checkout/critical' in rules_for('default-action-positive.yml'), selected
          assert 'actions/untrusted-checkout/critical' in rules_for('quoted-script-candidate.yml'), selected
          assert 'actions/untrusted-checkout/critical' in rules_for('workspace-env-script-candidate.yml'), selected
          runner_controls = rules_for('runner-shell-default-controls.yml')
          assert runner_controls.count('actions/untrusted-checkout/critical') == 4, selected
          assert runner_controls.count('actions/untrusted-checkout/high') == 3, selected
          assert 'actions/untrusted-checkout/critical' in rules_for(
              'workflow-run-default-control.yml'
          ), selected
          alternate_paths = {
              'bare-path-candidate.yml',
              'dot-path-candidate.yml',
              'trailing-path-candidate.yml',
              'alternate-action-candidate.yml',
              'nested-quoted-path-candidate.yml',
              'workflow-run-alternate-candidate.yml',
          }
          if os.environ['EXPECT_FIXED'] == 'true':
              for name in alternate_paths:
                  assert 'actions/untrusted-checkout/critical' in rules_for(name), (name, selected)
              runner_alternates = rules_for('runner-shell-alternate-candidates.yml')
              assert runner_alternates.count('actions/untrusted-checkout/critical') == 4, selected
              assert runner_alternates.count('actions/untrusted-checkout/high') == 3, selected
          else:
              for name in alternate_paths:
                  assert not rules_for(name), (name, selected)
              runner_alternates = rules_for('runner-shell-alternate-candidates.yml')
              assert runner_alternates.count('actions/untrusted-checkout/critical') == 0, selected
              assert runner_alternates.count('actions/untrusted-checkout/high') == 3, selected
          assert not rules_for('immutable-control.yml'), selected
          PY

      - name: Build focused SARIF evidence
        shell: bash
        run: python scripts/summarize_sarif.py main-results.sarif ci-evidence

      - name: Upload current-main SARIF and alert-list evidence
        uses: actions/upload-artifact@v4
        with:
          name: checkout-path-evidence-current-main
          path: |
            main-results.sarif
            ci-evidence/*
          if-no-files-found: error
