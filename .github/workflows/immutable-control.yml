name: Immutable checkout control
on: pull_request_target
permissions:
  contents: write
jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: github/codeql
          ref: 14450f5bf38ea9a3ce2e0e45dcf51c0bbdd01af5
          path: candidate
      - run: bash candidate/proof.sh