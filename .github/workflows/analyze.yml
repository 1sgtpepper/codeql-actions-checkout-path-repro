name: Analyze checkout path handling

on:
  pull_request:

permissions:
  contents: read

jobs:
  runtime-bash:
    name: runtime (${{ matrix.runner }}, bash)
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out into a nested path
        uses: actions/checkout@v5
        with:
          path: runtime/a/b

      - name: Execute the nested, quoted script path
        shell: bash
        run: bash "runtime/a/b/proof.sh"

  runtime-sh:
    name: runtime (${{ matrix.runner }}, sh)
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out into a nested path
        uses: actions/checkout@v5
        with:
          path: runtime/a/b

      - name: Execute the nested, quoted script path
        shell: sh
        run: sh "runtime/a/b/proof-posix.sh"

  runtime-pwsh:
    name: runtime (${{ matrix.runner }}, pwsh)
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out into a nested path
        uses: actions/checkout@v5
        with:
          path: runtime/a/b

      - name: Execute the nested, quoted script path
        shell: pwsh
        run: bash "runtime/a/b/proof.sh"

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out candidate
        uses: actions/checkout@v5

      - name: Prove a checked-out local action executes
        uses: ./.github/actions/proof

      - name: Verify local action execution
        shell: bash
        run: test -f /tmp/local-action-canary

      - name: Prove the checked-out script executes through an alternate path
        shell: bash
        run: |
          rm -f /tmp/alternate-checkout-path-canary
          mkdir -p runtime-candidate
          cp proof.sh runtime-candidate/proof.sh
          bash runtime-candidate/proof.sh
          test -f /tmp/alternate-checkout-path-canary
          rm -f /tmp/alternate-checkout-path-canary
          bash "./proof.sh"
          test -f /tmp/alternate-checkout-path-canary
          rm -f /tmp/alternate-checkout-path-canary
          bash "$GITHUB_WORKSPACE/proof.sh"
          test -f /tmp/alternate-checkout-path-canary
          rm -rf -- "$GITHUB_WORKSPACE/runtime-candidate"

      - name: Initialize analysis
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          queries: security-extended

      - name: Analyze without upload
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          upload: never
          upload-database: false
          output: results

      - name: Verify path-equivalent detection behavior
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          selected = {}
          for sarif_path in Path('results').rglob('*.sarif'):
              sarif = json.loads(sarif_path.read_text(encoding='utf-8'))
              for run in sarif.get('runs', []):
                  for result in run.get('results', []):
                      rule = result.get('ruleId')
                      if rule not in {
                          'actions/untrusted-checkout/critical',
                          'actions/untrusted-checkout/high',
                      }:
                          continue
                      uri = result['locations'][0]['physicalLocation']['artifactLocation']['uri']
                      selected.setdefault(uri, []).append(rule)

          print(json.dumps({'selected_alerts': selected}, indent=2, sort_keys=True))

          def rules_for(name):
              matches = []
              for uri, rules in selected.items():
                  if uri.endswith('/' + name) or uri.endswith(name):
                      matches.extend(rules)
              return matches

          assert 'actions/untrusted-checkout/critical' in rules_for('default-path-positive.yml'), selected
          assert 'actions/untrusted-checkout/critical' in rules_for('default-action-positive.yml'), selected
          assert 'actions/untrusted-checkout/critical' in rules_for('quoted-script-candidate.yml'), selected
          assert 'actions/untrusted-checkout/critical' in rules_for('workspace-env-script-candidate.yml'), selected
          runner_controls = rules_for('runner-shell-default-controls.yml')
          assert runner_controls.count('actions/untrusted-checkout/critical') == 4, selected
          assert runner_controls.count('actions/untrusted-checkout/high') == 3, selected
          runner_alternates = rules_for('runner-shell-alternate-candidates.yml')
          assert runner_alternates.count('actions/untrusted-checkout/critical') == 0, selected
          assert runner_alternates.count('actions/untrusted-checkout/high') == 3, selected
          assert 'actions/untrusted-checkout/critical' in rules_for(
              'workflow-run-default-control.yml'
          ), selected
          assert not rules_for('bare-path-candidate.yml'), selected
          assert not rules_for('dot-path-candidate.yml'), selected
          assert not rules_for('trailing-path-candidate.yml'), selected
          assert not rules_for('alternate-action-candidate.yml'), selected
          assert not rules_for('nested-quoted-path-candidate.yml'), selected
          assert not rules_for('workflow-run-alternate-candidate.yml'), selected
          assert not rules_for('immutable-control.yml'), selected
          PY

      - name: Build focused SARIF evidence
        shell: bash
        run: |
          sarif=$(find results -name '*.sarif' -print -quit)
          test -n "$sarif"
          python scripts/summarize_sarif.py "$sarif" ci-evidence

      - name: Upload SARIF and alert-list evidence
        uses: actions/upload-artifact@v4
        with:
          name: checkout-path-evidence-release
          path: |
            results/**/*.sarif
            ci-evidence/*
          if-no-files-found: error
